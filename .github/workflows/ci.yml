name: CineLog CI - Sprint 2

on:
  pull_request:
    [cite_start] types: [opened, synchronize, reopened]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        [cite_start]uses: actions/checkout@v4 

      - name: Configurar Node.js (ou sua linguagem)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalação de dependências
        [cite_start]run: npm install 

      - name: Verificação de Build
        [cite_start]run: npm run build --if-present

      - name: Execução dos testes automatizados
        [cite_start]run: npm test 

      - name: Validação sintática de arquivos YAML
        run: |
          find . -name "*.yml" -o -name "*.yaml" | xargs -I {} npx yaml-lint {} # [cite: 30]

      - name: Verificação de arquivos mínimos obrigatórios
        run: |
          test -f README.md || (echo "Faltando README.md" && exit 1)
          test -d .github/workflows/ || (echo "Faltando diretório de workflows" && exit 1)
          test -f docs/riscos.md || (echo "Faltando documento de riscos" && exit 1)
          test -f .github/PULL_REQUEST_TEMPLATE.md || (echo "Faltando template de PR" && exit 1)
