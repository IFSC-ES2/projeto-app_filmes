<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <title>Cinelog - Login</title>
  <link rel="stylesheet" href="estilo.css" />
</head>

<body>
    <header>
        <a class="logo" href="#">
            <div class="logo-icone">🍿</div>
            <span class="logo-texto">Cine<span>log</span></span>
        </a>
        <nav>
            <a href="#">Filmes</a>
            <a href="#">Séries</a>
            <a href="#">Top 100</a>
            <a href="#" class="nav-btn">Login</a>
        </nav>
    </header>

    <div class="login">
      <h2>Entrar</h2>
      <p>Use seu e-mail e senha para acessar.</p>

      <label>E-mail</label>
      <input type="email" placeholder="seu@email.com" />

      <label>Senha</label>
      <input type="password" placeholder="••••••••" />

      <div class="linha">
        <label><input type="checkbox" /> Lembrar de mim</label>
        <a href="#">Esqueci a senha</a>
      </div>

      <button>Entrar</button>

      <p></p>
      <p>Não tem conta? <a href="#">Cadastre-se</a></p>
    </div>

</body>
</html>
