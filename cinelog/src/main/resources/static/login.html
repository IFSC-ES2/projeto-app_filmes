<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <title>Cinelog - Login</title>
  <link rel="stylesheet" href="estilo.css" />
</head>

<body>
    <header>
        <a class="logo" href="#">
            <div class="logo-icone">🍿</div>
            <span class="logo-texto">Cine<span>log</span></span>
        </a>
        <nav>
            <a href="#">Filmes</a>
            <a href="#">Séries</a>
            <a href="#">Top 100</a>
            <a href="#" class="nav-btn">Login</a>
        </nav>
    </header>

    <div class="login">
      <div class="tabs">
        <button id="showLogin" class="tab-button active">Entrar</button>
        <button id="showRegister" class="tab-button">Cadastrar</button>
      </div>

      <div id="message" class="message"></div>

      <form id="loginForm">
        <h2>Entrar</h2>
        <p>Use seu e-mail e senha para acessar.</p>

        <label for="loginEmail">E-mail</label>
        <input id="loginEmail" type="email" placeholder="seu@email.com" required />

        <label for="loginSenha">Senha</label>
        <input id="loginSenha" type="password" placeholder="••••••••" required />

        <button type="submit">Entrar</button>
      </form>

      <form id="registerForm" class="hidden">
        <h2>Cadastrar</h2>
        <p>Crie sua conta para usar o CineLog.</p>

        <label for="registerNome">Nome</label>
        <input id="registerNome" type="text" placeholder="Seu nome" required />

        <label for="registerEmail">E-mail</label>
        <input id="registerEmail" type="email" placeholder="seu@email.com" required />

        <label for="registerSenha">Senha</label>
        <input id="registerSenha" type="password" placeholder="••••••••" required minlength="6" />

        <button type="submit">Cadastrar</button>
      </form>

      <div id="welcomeScreen" class="hidden welcome-screen">
        <h2>Bem-vindo ao CineLog</h2>
        <p id="welcomeText"></p>
        <button id="logoutButton" class="secondary-button">Sair</button>
      </div>
    </div>

    <script>
      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');
      const showLogin = document.getElementById('showLogin');
      const showRegister = document.getElementById('showRegister');
      const message = document.getElementById('message');
      const welcomeScreen = document.getElementById('welcomeScreen');
      const welcomeText = document.getElementById('welcomeText');
      const logoutButton = document.getElementById('logoutButton');

      showLogin.addEventListener('click', () => {
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
        welcomeScreen.classList.add('hidden');
        showLogin.classList.add('active');
        showRegister.classList.remove('active');
        message.textContent = '';
      });

      showRegister.addEventListener('click', () => {
        registerForm.classList.remove('hidden');
        loginForm.classList.add('hidden');
        welcomeScreen.classList.add('hidden');
        showRegister.classList.add('active');
        showLogin.classList.remove('active');
        message.textContent = '';
      });

      loginForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        const payload = {
          email: document.getElementById('loginEmail').value,
          senha: document.getElementById('loginSenha').value,
        };
        await postAuth('/api/auth/login', payload, true);
      });

      registerForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        const payload = {
          nome: document.getElementById('registerNome').value,
          email: document.getElementById('registerEmail').value,
          senha: document.getElementById('registerSenha').value,
        };
        await postAuth('/api/auth/register', payload, false);
      });

      logoutButton.addEventListener('click', () => {
        welcomeScreen.classList.add('hidden');
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
        showLogin.classList.add('active');
        showRegister.classList.remove('active');
        message.textContent = '';
      });

      async function postAuth(url, data, showWelcome = false) {
        try {
          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data),
          });
          const body = await response.json();
          if (!response.ok) {
            showMessage(body.message || 'Erro ao processar a requisição', false);
            return;
          }
          showMessage(body.message, true);
          if (showWelcome) {
            showWelcomeScreen(body.nome);
          } else {
            showLogin.click();
          }
        } catch (error) {
          showMessage('Erro de conexão. Tente novamente.', false);
        }
      }

      function showWelcomeScreen(nome) {
        welcomeText.textContent = `Você está autenticado como ${nome}.`;
        welcomeScreen.classList.remove('hidden');
        loginForm.classList.add('hidden');
        registerForm.classList.add('hidden');
        showLogin.classList.remove('active');
        showRegister.classList.remove('active');
      }

      function showMessage(text, success) {
        message.textContent = text;
        message.className = success ? 'message success' : 'message error';
      }
    </script>
  </body>
</html>
